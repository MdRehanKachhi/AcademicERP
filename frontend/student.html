<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="loadStudentDashboard()">

<div class="sidebar">

<a href="student.html">Dashboard</a>

<a href="student_semester_details.html">Semester Details</a>

<a href="student_leave.html">Apply Leave</a>

<a href="student_leave_status.html">Leave Status</a>

<a href="print_student.html">View Report</a>

<a href="index.html">Logout</a>

</div>

<div class="main">

    <div class="header">
        <h2>Student Dashboard</h2>
    </div>
   

    <div class="cards">

        <div class="card">
            <h3 id="studentName"></h3>
            <p>Name</p>
        </div>

        <div class="card">
            <h3 id="studentRoll"></h3>
            <p>Roll Number</p>
        </div>

        <div class="card clickable-card" id="attendanceCard" onclick="toggleStudentAttendanceDetails()">
            <h3 id="attendancePercent"></h3>
            <p>Attendance % (Click for Details)</p>
        </div>

    </div>

    <div class="card attendance-details" id="attendanceDetailsCard" style="display:none;">
        <h3>Attendance Details</h3>
        <table width="100%">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="attendanceDetailsBody"></tbody>
        </table>
    </div>

    <br>

    <h3>Marks</h3>

    <table border="1" width="100%" cellpadding="10">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Exam </th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody id="studentMarksTable">
        </tbody>
    </table>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>

</html>
