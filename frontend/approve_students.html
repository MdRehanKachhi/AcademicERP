<!DOCTYPE html>

</head>

    <h2>Student Approval Panel</h2>

</div>

<div class="container">

    <h3>Pending Student Registrations</h3>

                <th>Status</th>

        </thead>
        <tbody>
            <!-- Dynamic content -->
        </tbody>
    </table>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

</html>
