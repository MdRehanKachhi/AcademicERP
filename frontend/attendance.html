<!DOCTYPE html>
<html>
<head>
    <title>Attendance Module</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="loadAttendance()">

<div class="sidebar">
    <a href="faculty.html">Dashboard</a>
    <a href="attendance.html">Attendance</a>
    <a href="marks.html">Marks</a>
    <a href="index.html">Logout</a>
</div>

<div class="main">

    <div class="header">
        <h2>Attendance Module</h2>
    </div>

    <div class="card">
        <h3>Mark Attendance</h3>

        <table id="attendanceTable" width="100%">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <br>
        <button class="btn-primary" onclick="saveAttendance()">Save Attendance</button>
    </div>

    <br>

    <div class="card">
        <h3>Attendance Summary</h3>

        <table id="attendanceSummary" width="100%">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>ML</th>
                    <th>Percentage</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>

</html>
