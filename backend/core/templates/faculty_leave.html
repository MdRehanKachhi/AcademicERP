<!DOCTYPE html>
<html>
<head>`n    {% load static %}
    <title>Faculty Leave</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/app.js' %}"></script>
</head>

<body>

<div class="sidebar">
    <a href="faculty.html">Dashboard</a>
    <a href="faculty_leave.html">Apply Leave</a>
    <a href="index.html">Logout</a>
</div>

<div class="main">
    <div class="header">
        <h2>Faculty Leave Application</h2>
    </div>

    <div class="card">
        <form onsubmit="applyLeave(event,'faculty')">
            <label>From Date</label>
            <input type="date" id="fromDate" required>

            <label>To Date</label>
            <input type="date" id="toDate" required>

            <label>Reason</label>
            <textarea id="reason" required></textarea>

            <button type="submit" class="btn-primary">Apply Leave</button>
        </form>
    </div>
</div>

</body>
</html>
