<!DOCTYPE html>
<html>
<head>`n    {% load static %}
    <title>Student Registration | Academic ERP</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="header">
    <h2>Student Self Registration</h2>
    <button class="btn-danger" onclick="history.back()">Back</button>
</div>

<div class="form-box">
    <div id="hodRegistrationPanel" class="registration-share-card" style="display:none;">
        <h3>Share Registration Link</h3>
        <p>Send this link to students so they can open the self-registration form.</p>

        <input type="text" id="registrationLink" readonly>

        <div class="registration-actions">
            <button type="button" class="btn-primary" onclick="copyRegistrationLink()">
                Copy Link
            </button>
            <button type="button" class="btn-primary" onclick="openRegistrationLink()">
                Open Form
            </button>
        </div>

        <p id="registrationLinkStatus" class="registration-status"></p>
    </div>

    <div id="studentRegistrationPanel" style="display:none;">
        <h3>Enter Student Details</h3>

        <p id="registrationError" class="registration-status" style="display:none; color:#b83434;"></p>
        <p id="registrationSuccessMessage" class="registration-status" style="display:none; color:#177245;"></p>

        <form id="studentRegistrationForm" class="registration-form" onsubmit="submitRegistration(event)" novalidate>
            <div class="form-grid form-grid-3">
                <div class="form-field">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" name="first_name" placeholder="Enter first name" required>
                    <small class="field-error" data-error-for="first_name"></small>
                </div>

                <div class="form-field">
                    <label for="middleName">Middle Name</label>
                    <input type="text" id="middleName" name="middle_name" placeholder="Enter middle name">
                    <small class="field-error" data-error-for="middle_name"></small>
                </div>

                <div class="form-field">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" name="last_name" placeholder="Enter last name" required>
                    <small class="field-error" data-error-for="last_name"></small>
                </div>
            </div>

            <div class="form-grid form-grid-2">
                <div class="form-field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="Enter email address" required>
                    <small class="field-error" data-error-for="email"></small>
                </div>

                <div class="form-field">
                    <label for="dateOfBirth">Date of Birth *</label>
                    <input type="date" id="dateOfBirth" name="date_of_birth" required>
                    <small class="field-error" data-error-for="date_of_birth"></small>
                </div>
            </div>

            <div class="form-grid form-grid-2">
                <div class="form-field">
                    <label for="gender">Gender *</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                    <small class="field-error" data-error-for="gender"></small>
                </div>

                <div class="form-field">
                    <label for="className">Class *</label>
                    <select id="className" name="academic_class" required>
                        <option value="">Select Class</option>
                    </select>
                    <small class="field-error" data-error-for="academic_class"></small>
                </div>
            </div>

            <div class="form-grid form-grid-2">
                <div class="form-field">
                    <label for="studentWhatsappNumber">Student WhatsApp Number *</label>
                    <input type="tel" id="studentWhatsappNumber" name="student_whatsapp_number" placeholder="10-digit number" inputmode="numeric" maxlength="10" required>
                    <small class="field-error" data-error-for="student_whatsapp_number"></small>
                </div>

                <div class="form-field">
                    <label for="parentWhatsappNumber">Parent WhatsApp Number *</label>
                    <input type="tel" id="parentWhatsappNumber" name="parent_whatsapp_number" placeholder="10-digit number" inputmode="numeric" maxlength="10" required>
                    <small class="field-error" data-error-for="parent_whatsapp_number"></small>
                </div>
            </div>

            <div class="form-grid form-grid-2">
                <div class="form-field">
                    <label for="caste">Caste</label>
                    <select id="caste" name="caste">
                        <option value="">Select Caste</option>
                        <option value="Open">Open</option>
                        <option value="OBC">OBC</option>
                        <option value="SC">SC</option>
                        <option value="ST">ST</option>
                        <option value="SBC">SBC</option>
                        <option value="NT">NT</option>
                        <option value="Other">Other</option>
                    </select>
                    <small class="field-error" data-error-for="caste"></small>
                </div>

                <div class="form-field">
                    <label for="subCaste">Sub Caste</label>
                    <input type="text" id="subCaste" name="sub_caste" placeholder="Enter sub caste">
                    <small class="field-error" data-error-for="sub_caste"></small>
                </div>
            </div>

            <div class="form-field">
                <label for="address">Address *</label>
                <textarea id="address" name="address" placeholder="Enter full address" required></textarea>
                <small class="field-error" data-error-for="address"></small>
            </div>

            <div class="form-grid form-grid-3">
                <div class="form-field">
                    <label for="district">District *</label>
                    <select id="district" name="district" onchange="handleDistrictChange()" required>
                        <option value="">Select District</option>
                    </select>
                    <small class="field-error" data-error-for="district"></small>
                </div>

                <div class="form-field">
                    <label for="taluka">Taluka *</label>
                    <select id="taluka" name="taluka" required>
                        <option value="">Select Taluka</option>
                    </select>
                    <small class="field-error" data-error-for="taluka"></small>
                </div>

                <div class="form-field">
                    <label for="pincode">Pincode *</label>
                    <input type="text" id="pincode" name="pincode" placeholder="6-digit pincode" inputmode="numeric" maxlength="6" required>
                    <small class="field-error" data-error-for="pincode"></small>
                </div>
            </div>

            <div class="form-grid form-grid-2">
                <div class="form-field">
                    <label for="abcId">ABC ID</label>
                    <input type="text" id="abcId" name="abc_id" placeholder="Enter ABC ID if available">
                    <small class="field-error" data-error-for="abc_id"></small>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                Submit Registration
            </button>
        </form>
    </div>

    <div id="registrationSuccessPanel" class="registration-share-card" style="display:none;">
        <h3>Thank You</h3>
        <p>Your information is recorded. Waiting for HOD's approval.</p>
    </div>

</div>

<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
